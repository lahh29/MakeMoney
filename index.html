<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <!-- Viewport: prevent iOS auto-zoom, cover all screen sizes -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>PostSell</title>
  <meta name="description" content="Sistema de gestión inteligente de postventa" />

  <!-- PWA theme color (matches --apple-blue) -->
  <meta name="theme-color" content="#0071e3" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- iOS Safari PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vertx Systems" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

  <!-- Android Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileColor" content="#0071e3" />

  <!-- Favicon animado SVG (light/dark auto) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <!-- Fallback PNG para browsers sin soporte SVG favicon -->
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
